<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 168" role="img" aria-label="PRISM — Reflect the Whole Human">
  <defs>
    <!-- Soft 3D letter gradients matching uploaded logo -->
    <linearGradient id="gradP" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#FF7EB6"/>
      <stop offset="55%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#E11D8A"/>
    </linearGradient>
    <linearGradient id="gradR" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="45%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#FDBA74"/>
    </linearGradient>
    <linearGradient id="gradS" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="55%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="gradM" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="prismFill" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F0FDFF"/>
      <stop offset="35%" stop-color="#A5F3FC"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="prismSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F2FE" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="lineL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="lineR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="letterDepth" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.4" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Wordmark with soft embossed depth -->
  <g filter="url(#letterDepth)" font-family="Poppins, Arial Black, Helvetica, sans-serif" font-size="96" font-weight="800">
    <text x="24" y="98" fill="url(#gradP)">P</text>
    <text x="118" y="98" fill="url(#gradR)">R</text>

    <!-- Prism as the letter I — glowing vertical triangle -->
    <g transform="translate(220,12)" filter="url(#softGlow)">
      <polygon points="30,2 58,132 2,132" fill="url(#prismFill)"/>
      <polygon points="30,2 58,132 30,132" fill="#0EA5E9" opacity="0.22"/>
      <polygon points="30,2 30,132 2,132" fill="url(#prismSide)"/>
      <line x1="30" y1="2" x2="2" y2="132" stroke="#FFFFFF" stroke-width="2.2" opacity="0.85"/>
      <line x1="30" y1="2" x2="58" y2="132" stroke="#BAE6FD" stroke-width="2" opacity="0.65"/>
      <line x1="2" y1="132" x2="58" y2="132" stroke="#E0F2FE" stroke-width="2.5" opacity="0.8"/>
      <polygon points="30,2 38,20 22,20" fill="#FFFFFF" opacity="0.95"/>
    </g>

    <text x="296" y="98" fill="url(#gradS)">S</text>
    <text x="390" y="98" fill="url(#gradM)">M</text>
  </g>

  <!-- Tagline: all-caps with pink → purple flanking lines -->
  <line x1="40" y1="134" x2="148" y2="134" stroke="url(#lineL)" stroke-width="2" stroke-linecap="round"/>
  <text
    x="280"
    y="140"
    text-anchor="middle"
    font-family="Figtree, Inter, Helvetica, sans-serif"
    font-size="15"
    font-weight="600"
    letter-spacing="1.6"
    fill="#F8FAFC"
  >REFLECT THE WHOLE HUMAN</text>
  <line x1="412" y1="134" x2="520" y2="134" stroke="url(#lineR)" stroke-width="2" stroke-linecap="round"/>
</svg>
