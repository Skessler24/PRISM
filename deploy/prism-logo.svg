<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-label="PRISM — Reflect the Whole Human">
  <defs>
    <!-- Vertical gradients: lighter top → richer bottom (matches uploaded wordmark) -->
    <linearGradient id="pGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FF9EC8"/>
      <stop offset="45%" stop-color="#FF4FA0"/>
      <stop offset="100%" stop-color="#C2185B"/>
    </linearGradient>
    <linearGradient id="rGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFD27A"/>
      <stop offset="40%" stop-color="#FF9F1C"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="iGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="18%" stop-color="#E6FFFB"/>
      <stop offset="55%" stop-color="#7AF0E0"/>
      <stop offset="100%" stop-color="#2EC4B6"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#9AE6FF"/>
      <stop offset="45%" stop-color="#3DB2FF"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="mGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#E0D4FF"/>
      <stop offset="45%" stop-color="#B388FF"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
    <linearGradient id="lineL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF4FA0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF4FA0"/>
    </linearGradient>
    <linearGradient id="lineR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B388FF"/>
      <stop offset="100%" stop-color="#B388FF" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="softDepth" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="prismGlow" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wide-spaced PRISM wordmark -->
  <g filter="url(#softDepth)" font-family="Arial Black, Helvetica Neue, Impact, sans-serif" font-weight="900">
    <text x="28" y="118" font-size="118" fill="url(#pGrad)" letter-spacing="2">P</text>
    <text x="145" y="118" font-size="118" fill="url(#rGrad)" letter-spacing="2">R</text>

    <!-- Tall slender prism triangle as the letter I -->
    <g transform="translate(268, 8)" filter="url(#prismGlow)">
      <!-- Main isosceles triangle -->
      <polygon points="34,4 64,128 4,128" fill="url(#iGrad)"/>
      <!-- Right facet shade -->
      <polygon points="34,4 64,128 34,128" fill="#0A7C72" opacity="0.22"/>
      <!-- Left highlight facet -->
      <polygon points="34,4 34,128 4,128" fill="#FFFFFF" opacity="0.18"/>
      <!-- Crisp edges -->
      <polygon points="34,4 64,128 4,128" fill="none" stroke="#E6FFFB" stroke-width="2.5" opacity="0.85"/>
      <!-- Small white apex triangle -->
      <polygon points="34,4 42,22 26,22" fill="#FFFFFF"/>
    </g>

    <text x="360" y="118" font-size="118" fill="url(#sGrad)" letter-spacing="2">S</text>
    <text x="475" y="118" font-size="118" fill="url(#mGrad)" letter-spacing="2">M</text>
  </g>

  <!-- Tagline with pink/purple flanking lines -->
  <line x1="70" y1="152" x2="175" y2="152" stroke="url(#lineL)" stroke-width="2.5" stroke-linecap="round"/>
  <text
    x="320"
    y="158"
    text-anchor="middle"
    font-family="Helvetica Neue, Segoe UI, Arial, sans-serif"
    font-size="18"
    font-weight="500"
    letter-spacing="2.2"
    fill="#F3F4F6"
  >Reflect the Whole Human</text>
  <line x1="465" y1="152" x2="570" y2="152" stroke="url(#lineR)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
